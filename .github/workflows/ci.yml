name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26' # マイナーまで指定し、check-latest で常に最新パッチを取得 (stdlib の脆弱性修正を自動反映)
          check-latest: true
          cache: true

      - name: Install code generators
        run: |
          # templ CLI は go.mod のランタイムと同じバージョンに揃える。
          # @latest だと新版 CLI が古いランタイムに無い API を呼ぶ生成コードを吐いて
          # ビルドが壊れることがある（2026-05-30 の ResolveAttributeValue 事故）。
          go install github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ)
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          # tailwindcss はバージョン固定（minify 出力がバージョンで変わるため、ローカルの make generate と揃える）
          TAILWIND_VERSION=v4.2.1
          mkdir -p "$HOME/bin"
          curl -fsSL -o "$HOME/bin/tailwindcss" \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64"
          chmod +x "$HOME/bin/tailwindcss"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Generate code (sqlc + templ + tailwind)
        run: |
          sqlc generate
          templ generate
          tailwindcss -i web/static/css/input.css -o web/static/css/style.css --minify

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Test (with coverage)
        # -coverpkg=./... で integration テスト等が他パッケージを呼んだ行もカバレッジに含める
        run: go test -coverpkg=./... -coverprofile=coverage.out ./...

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.out ]; then
            echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            go tool cover -func=coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo '<details><summary>Per-package detail</summary>' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo '</details>' >> $GITHUB_STEP_SUMMARY
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
